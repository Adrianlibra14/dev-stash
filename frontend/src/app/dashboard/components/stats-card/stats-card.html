<div class="flex items-center gap-4 rounded-xl bg-card p-4">
  <div
    class="flex size-10 shrink-0 items-center justify-center rounded-lg"
    [style.background]="'color-mix(in oklch, ' + color() + ' 15%, transparent)'"
  >
    <ng-icon [name]="icon()" class="size-5" [style.color]="color()" />
  </div>
  <div class="min-w-0">
    <p class="text-2xl font-bold text-card-foreground tabular-nums">{{ value() }}</p>
    <p class="text-xs text-muted-foreground truncate">{{ label() }}</p>
  </div>
</div>
