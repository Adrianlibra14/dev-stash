<div
  class="group relative cursor-pointer overflow-hidden rounded-xl border border-border p-5 transition-all hover:shadow-lg"
  [style.background]="'color-mix(in oklch, ' + dominantColor() + ' 12%, var(--card))'"
>
  <div class="flex items-start justify-between gap-2">
    <div class="flex-1 min-w-0">
      <h3 class="text-base font-semibold text-card-foreground">{{ collection().name }}</h3>
      @if (collection().description) {
        <p class="mt-1 text-sm text-muted-foreground line-clamp-2">{{ collection().description }}</p>
      }
    </div>
    @if (collection().isFavorite) {
      <ng-icon name="lucideStar" class="size-4 shrink-0 text-yellow-400" />
    }
  </div>

  <div class="mt-3 flex items-center gap-2">
    @if (defaultType()) {
      <z-badge
        [zType]="'secondary'"
        [style.background]="'color-mix(in oklch, ' + defaultType()!.color + ' 20%, transparent)'"
        [style.color]="defaultType()!.color"
      >
        {{ defaultType()!.name }}
      </z-badge>
    }
    <span class="text-xs text-muted-foreground">{{ itemCount() }} items</span>
  </div>
</div>
