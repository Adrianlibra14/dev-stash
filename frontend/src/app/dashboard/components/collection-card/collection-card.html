<div
  class="group relative cursor-pointer overflow-hidden rounded-xl border-0 p-5 transition-all hover:shadow-lg"
  [style.background]="'var(--card)'"
  [style.border-left]="'3px solid ' + dominantColor()"
>
  <div class="flex items-start justify-between gap-2">
    <div class="flex-1 min-w-0">
      <h3 class="text-base font-semibold text-card-foreground">{{ collection().name }}</h3>
      @if (collection().description) {
        <p class="mt-1 text-sm text-muted-foreground line-clamp-2">{{ collection().description }}</p>
      }
    </div>
    @if (collection().isFavorite) {
      <ng-icon name="lucideStar" class="size-4 shrink-0 text-yellow-400" />
    }
  </div>

  <div class="mt-4 flex items-center justify-between">
    <span class="text-xs text-muted-foreground">View {{ itemCount() }} items</span>
    @if (defaultType()) {
      <span
        class="inline-flex items-center rounded-md px-2 py-0.5 text-xs font-medium"
        [style.background]="'color-mix(in oklch, ' + defaultType()!.color + ' 15%, transparent)'"
        [style.color]="defaultType()!.color"
      >
        {{ defaultType()!.name }}
      </span>
    } @else {
      <span class="inline-flex items-center rounded-md bg-secondary px-2 py-0.5 text-xs text-muted-foreground">
        Mixed
      </span>
    }
  </div>
</div>
